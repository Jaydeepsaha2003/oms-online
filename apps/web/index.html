<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OMS — Order Management</title>

    <!-- PWA: installable on desktop, Android and iPhone -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1e40af" />
    <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon-64.png" />
    <meta name="application-name" content="OMS" />
    <!-- iOS home-screen install (Safari → Share → Add to Home Screen) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OMS" />

    <!-- Instant welcome / reload splash. Pure HTML+CSS so it paints on the very
         first frame (before the JS bundle loads) on desktop AND mobile; main.tsx
         fades it out once React has mounted. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(125% 125% at 50% 0%, #eef2ff 0%, #f8fafc 55%, #eef1f6 100%);
        opacity: 1;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #app-splash.app-splash--hide { opacity: 0; visibility: hidden; pointer-events: none; }
      .app-splash__stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(14px, 4vw, 22px);
        animation: appSplashIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .app-splash__logo {
        position: relative;
        width: clamp(84px, 26vw, 108px);
        height: clamp(84px, 26vw, 108px);
        display: grid;
        place-items: center;
        animation: appSplashFloat 3.2s ease-in-out 0.7s infinite;
      }
      /* Spinning gradient halo (conic gradient masked to a ring). */
      .app-splash__ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(from 0deg, rgba(37, 99, 235, 0) 0deg, #2563eb 90deg, #f97316 220deg, #f59e0b 300deg, rgba(37, 99, 235, 0) 360deg);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px));
        mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px));
        animation: appSplashSpin 1.15s linear infinite;
      }
      .app-splash__tile {
        width: 68%;
        height: 68%;
        border-radius: 26%;
        display: grid;
        place-items: center;
        color: #fff;
        background-image: linear-gradient(135deg, #2563eb 0%, #4f46e5 42%, #f97316 100%);
        box-shadow: 0 18px 40px -14px rgba(37, 99, 235, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }
      .app-splash__tile svg {
        width: 52%;
        height: 52%;
        animation: appSplashPop 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
      }
      .app-splash__word {
        font-family: 'Inter Variable', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-weight: 800;
        font-size: clamp(30px, 9vw, 40px);
        letter-spacing: 0.14em;
        line-height: 1;
        background-image: linear-gradient(100deg, #2563eb, #f97316 68%, #f59e0b);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .app-splash__tag {
        margin-top: -6px;
        font-family: 'Inter Variable', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: clamp(11px, 3.4vw, 13px);
        font-weight: 500;
        letter-spacing: 0.02em;
        color: #64748b;
        animation: appSplashFade 0.6s ease 0.35s both;
      }
      .app-splash__bar {
        margin-top: 4px;
        width: clamp(150px, 46vw, 190px);
        height: 4px;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
      }
      .app-splash__bar > span {
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 999px;
        background-image: linear-gradient(90deg, #2563eb, #6366f1 50%, #f97316);
        animation: appSplashSlide 1.25s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      @keyframes appSplashIn { from { opacity: 0; transform: translateY(14px) scale(0.96); } to { opacity: 1; transform: none; } }
      @keyframes appSplashPop { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: none; } }
      @keyframes appSplashFade { from { opacity: 0; } to { opacity: 1; } }
      @keyframes appSplashSpin { to { transform: rotate(360deg); } }
      @keyframes appSplashFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
      @keyframes appSplashSlide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
      @media (prefers-color-scheme: dark) {
        #app-splash { background: radial-gradient(125% 125% at 50% 0%, #0f1731 0%, #0b1020 60%, #090d1a 100%); }
        .app-splash__tag { color: #94a3b8; }
        .app-splash__bar { background: rgba(255, 255, 255, 0.09); }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash__stage, .app-splash__logo, .app-splash__tile svg, .app-splash__ring, .app-splash__bar > span, .app-splash__tag { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
        .app-splash__ring { animation: appSplashSpin 1.15s linear infinite; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="app-splash" role="status" aria-label="Loading OMS">
      <div class="app-splash__stage">
        <div class="app-splash__logo">
          <span class="app-splash__ring"></span>
          <span class="app-splash__tile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M16.5 9.4 7.5 4.21" />
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
              <path d="M3.27 6.96 12 12.01l8.73-5.05" />
              <path d="M12 22.08V12" />
            </svg>
          </span>
        </div>
        <div class="app-splash__word">OMS</div>
        <div class="app-splash__tag">Order Management System</div>
        <div class="app-splash__bar"><span></span></div>
      </div>
    </div>
    <script>
      // Mark when the splash first painted (main.tsx keeps it up for a minimum
      // time so the animation is seen), and a hard safety timeout so a failed JS
      // load never leaves the splash stuck forever.
      window.__APP_SPLASH_START__ = Date.now();
      window.setTimeout(function () {
        var el = document.getElementById('app-splash');
        if (el) el.classList.add('app-splash--hide');
      }, 8000);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
