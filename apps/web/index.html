<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OMS — Order Management</title>

    <!-- PWA: installable on desktop, Android and iPhone -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1e40af" />
    <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon-64.png" />
    <meta name="application-name" content="OMS" />
    <!-- iOS home-screen install (Safari → Share → Add to Home Screen) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OMS" />
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Recovery: if React never mounted anything into #root long after load
      // AND a service worker is actively controlling this page, the most
      // likely cause is a stuck OLD service worker serving a broken cached
      // shell. Unregister it and reload once (guarded by sessionStorage so a
      // genuinely broken deploy doesn't reload-loop forever). The caches are
      // deliberately left alone: assets are content-hashed so stale entries
      // are harmless, and deleting them here used to wipe every prefetched
      // chunk whenever a slow VPN link made a legitimate load take longer
      // than the timer — turning one slow start into a catastrophically
      // slower fully-uncached second load. 30s is a pure backstop: the shell
      // is served from cache instantly now, so a healthy app mounts long
      // before this fires even on a dead-slow connection.
      window.setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount > 0) return;
        if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;
        if (sessionStorage.getItem('oms-sw-recovery-done')) return;
        sessionStorage.setItem('oms-sw-recovery-done', '1');
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }).finally(function () {
          location.reload();
        });
      }, 30000);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
