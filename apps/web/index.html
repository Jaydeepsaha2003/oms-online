<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OMS — Order Management</title>

    <!-- PWA: installable on desktop, Android and iPhone -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1e40af" />
    <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon-64.png" />
    <meta name="application-name" content="OMS" />
    <!-- iOS home-screen install (Safari → Share → Add to Home Screen) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OMS" />
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Recovery: if React never mounted anything into #root after a generous
      // wait AND a service worker is actively controlling this page, the most
      // likely cause is a stuck OLD service worker serving a stale cached page
      // from a previous deploy (its cached HTML can point at JS paths that no
      // longer exist). Unregister it, clear its caches, and reload once —
      // guarded by sessionStorage so a genuinely broken deploy doesn't
      // reload-loop forever. Only runs when a controller is actually present,
      // so a plain slow load (e.g. a weak mobile connection on a first visit,
      // with no service worker involved yet) is never mistaken for this and
      // reloaded mid-fetch.
      window.setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount > 0) return;
        if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;
        if (sessionStorage.getItem('oms-sw-recovery-done')) return;
        sessionStorage.setItem('oms-sw-recovery-done', '1');
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }).then(function () {
          if (!('caches' in window)) return;
          return caches.keys().then(function (names) {
            return Promise.all(names.map(function (n) { return caches.delete(n); }));
          });
        }).finally(function () {
          location.reload();
        });
      }, 12000);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
